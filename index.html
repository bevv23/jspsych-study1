<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forced-Choice Pilot</title>

  <!-- jsPsych core -->
  <script src="https://unpkg.com/jspsych@8.2.2"></script>
  <link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet" type="text/css" />

  <!-- plugins -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
</head>
<body></body>

<script>
  function getUrlParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }

  const sona_id = getUrlParam("sona_id") || "";
  const study_id = "forced_choice_pilot";
  const scriptURL = "https://script.google.com/macros/s/AKfycbzfxBvQdKRdmUKWwbAP2uYWtgbofdlvKfGrI04PQJ5wqoAFMG5IJTgqxa6ai1TW8zoN1g/exec";

  const jsPsych = initJsPsych({
    on_finish: async function() {
      const allData = jsPsych.data.get().values();

      const payload = {
        sona_id: sona_id,
        study_id: study_id,
        timestamp: new Date().toISOString(),
        responses: allData
      };

      try {
        await fetch(scriptURL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(payload)
        });

        document.body.innerHTML = `
          <div class="jspsych-content">
            <p><strong>Thank you.</strong></p>
            <p>Your responses have been submitted.</p>
            <p>You may now close this window.</p>
          </div>
        `;
      } catch (error) {
        console.error("Error saving data:", error);

        document.body.innerHTML = `
          <div class="jspsych-content">
            <p><strong>The task is complete, but there was a problem saving your data.</strong></p>
            <p>Please contact the researcher and provide this ID:</p>
            <p><strong>${sona_id || "NO_SONA_ID"}</strong></p>
          </div>
        `;
      }
    }
  });

  const timeline = [];

  const instructions = {
    type: jsPsychInstructions,
    pages: [
      `
      <p><strong>Welcome to the study.</strong></p>
      <p>You will see two personality adjectives.</p>
      <p>Your task is to identify the trait that is <strong>more desirable for a customer service representative</strong>.</p>
      <p>Press <strong>F</strong> for the word on the left.</p>
      <p>Press <strong>J</strong> for the word on the right.</p>
      `,
      `
      <p>Press <strong>Next</strong> to begin.</p>
      `
    ],
    show_clickable_nav: true
  };

  timeline.push(instructions);

  const fixation = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div style="font-size: 48px;">+</div>',
    choices: "NO_KEYS",
    trial_duration: 500,
    data: {
      task: "fixation",
      sona_id: sona_id,
      study_id: study_id
    }
  };

  const stimuli = [
    { left: "Antgonistic", right: "Inefficient", pair_id: 16_30, condition: "matched_negative" },
    { left: "Cooperative", right: "Precise", pair_id: 2, condition: "matched_positive" },
    { left: "Trustful", right: "Organized", pair_id: 3, condition: "matched_positive" },
    { left: "Sympathetic", right: "Active", pair_id: 4, condition: "matched_positive"},
    { left: "Warm". right: "Merry", pair_id: 5, condition: "matched_positive"},
    
  ];

  stimuli.forEach(item => {
    timeline.push(fixation);

    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <p style="font-size: 22px; margin-bottom: 40px;">
          Which trait is more desirable for a customer service representative?
        </p>

        <div style="display: flex; justify-content: space-around; align-items: center; margin-top: 30px;">
          <div style="text-align: center; width: 40%;">
            <div style="font-size: 18px; margin-bottom: 12px;"><strong>F</strong></div>
            <div style="font-size: 32px;">${item.left}</div>
          </div>

          <div style="text-align: center; width: 40%;">
            <div style="font-size: 18px; margin-bottom: 12px;"><strong>J</strong></div>
            <div style="font-size: 32px;">${item.right}</div>
          </div>
        </div>
      `,
      choices: ["f", "j"],
      data: {
        task: "forced_choice",
        left_word: item.left,
        right_word: item.right,
        condition: item.condition,
        pair_id: item.pair_id,
        sona_id: sona_id,
        study_id: study_id
      }
    });
  });

  const end_screen = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <p>You have finished the task.</p>
      <p>Press any key to submit your responses.</p>
    `,
    data: {
      task: "end_screen",
      sona_id: sona_id,
      study_id: study_id
    }
  };

  timeline.push(end_screen);

  jsPsych.run(timeline);
</script>
</html>
