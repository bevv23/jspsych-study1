<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Response Latencies Study 2</title>
<script src="https://unpkg.com/jspsych@8.2.2"></script>
<link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet">
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-html-form@2.1.0"></script>
<style>
html, body { margin:0!important; padding:0!important; background:#fff!important; color:#000!important; font-family:Arial,sans-serif; }
.jspsych-display-element,.jspsych-content-wrapper,.jspsych-content { background:#fff!important; color:#000!important; }
.jspsych-content { max-width:100%!important; }
button,.jspsych-btn { background:#fff!important; color:#000!important; border:1px solid #000!important; padding:8px 18px!important; font-size:16px!important; }
.instructions-box,.debrief-box,.form-box { max-width:800px; margin:40px auto; text-align:left; color:#000; line-height:1.35; font-size:17px; border-top:1px solid #000; padding-top:24px; }
.instructions-title,.debrief-title,.form-title { text-align:center; font-weight:bold; font-size:28px; margin-bottom:28px; }
.job-box { border:1px solid #000; padding:14px; margin:24px 0; font-style:italic; }
.job-title,.question-title { font-weight:bold; margin-bottom:10px; }
.question-block { margin-bottom:28px; }
.option-line { display:block; margin:8px 0; }
.text-input { width:260px; padding:6px; border:1px solid #000; font-size:16px; }
.trial-wrapper { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); width:1000px; text-align:center; }
.trial-content { width:100%; text-align:center; }
.pair-row { display:grid; grid-template-columns:1fr 1fr; column-gap:180px; align-items:center; }
.pair-option { width:100%; }
.key-label { font-size:22px; font-weight:bold; margin-bottom:18px; color:#808080!important; }
.word-label { font-size:42px; white-space:nowrap; color:#000!important; }
.practice-question { font-size:24px; margin-bottom:30px; color:#000!important; }
.practice-subtext { font-size:18px; margin-bottom:45px; color:#000!important; }
.fixation-wrapper { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); }
.fixation { font-size:58px; color:#000!important; }
</style>
</head>
<body></body>
<script>
function getUrlParam(param) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param);
}

const sona_id = getUrlParam("sona_id") || "NO_SONA_ID";
const return_url = "https://uteppsychology.az1.qualtrics.com/jfe/form/SV_6nxWdRPgkB7ftMG";

const jsPsych = initJsPsych({
  on_finish: function () {
    var main_data = jsPsych.data.get().filter({ task: "main_forced_choice" });
    var trials = main_data.values();

    function getSurveyValue(taskName, fieldName) {
      var row = jsPsych.data.get().filter({ task: taskName }).values()[0] || {};
      return row[fieldName] || "";
    }

    var payload = {
      sona_id: sona_id,
      completed: "1",
      n_main_trials: String(trials.length),
      trials: trials.map(function(t, index) {
        return {
          n: index + 1,
          pair_id: t.pair_id || "",
          condition: t.condition || "",
          word1: t.word1 || "",
          word2: t.word2 || "",
          key_pressed: t.response || "",
          chosen_standardized: t.chosen_standardized || "",
          chose_more_desirable: t.chose_more_desirable === undefined ? "" : t.chose_more_desirable,
          rt: t.rt || "",
          is_flipped: t.is_flipped === undefined ? "" : t.is_flipped
        };
      }),
      imc: getSurveyValue("imc_question", "imc"),
      english: getSurveyValue("english_question", "english"),
      careless: getSurveyValue("careless_question", "careless"),
      age: getSurveyValue("age_question", "age"),
      gender: getSurveyValue("gender_question", "gender"),
      gender_text: getSurveyValue("gender_question", "gender_text"),
      year_school: getSurveyValue("year_school_question", "year_school"),
      year_school_text: getSurveyValue("year_school_question", "year_school_text"),
      ethnicity: getSurveyValue("ethnicity_question", "ethnicity"),
      ethnicity_text: getSurveyValue("ethnicity_question", "ethnicity_text"),
      hispanic: getSurveyValue("hispanic_question", "hispanic")
    };

    window.location.href = return_url + "#data=" + encodeURIComponent(JSON.stringify(payload));
  }
});

const timeline = [];

function randomizePairSides(pair) {
  const flip = Math.random() < 0.5;
  return { ...pair, display_left: flip ? pair.word2 : pair.word1, display_right: flip ? pair.word1 : pair.word2, is_flipped: flip ? 1 : 0 };
}

function makeTrial(item, taskLabel, isPractice = false) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="trial-wrapper"><div class="trial-content">
        ${isPractice ? `
        <div class="practice-question">Which personality adjective below is more desirable in someone applying for the Customer Service Representative job?</div>
        <div class="practice-subtext">Press <strong>S</strong> for the adjective on the left and <strong>K</strong> for the adjective on the right.</div>
        ` : ``}
        <div class="pair-row">
          <div class="pair-option"><div class="key-label">S</div><div class="word-label">${item.display_left}</div></div>
          <div class="pair-option"><div class="key-label">K</div><div class="word-label">${item.display_right}</div></div>
        </div>
      </div></div>
    `,
    choices: ["s", "k"],
    data: { task: taskLabel, pair_id: item.pair_id, condition: item.condition, word1: item.word1, word2: item.word2, is_flipped: item.is_flipped },
    on_finish: function(data) {
      const chosen = data.response === "s" ? item.display_left : item.display_right;
      if (chosen === item.word1) data.chosen_standardized = "word1";
      else if (chosen === item.word2) data.chosen_standardized = "word2";
      else data.chosen_standardized = "";
      if (item.condition === "mixed") data.chose_more_desirable = chosen === item.more_desirable ? 1 : 0;
      else data.chose_more_desirable = "";
    }
  };
}

function parseSurveyResponse(data) {
  const response = data.response || {};
  Object.keys(response).forEach(key => { data[key] = response[key]; });
}

const fixation = { type: jsPsychHtmlKeyboardResponse, stimulus: '<div class="fixation-wrapper"><div class="fixation">+</div></div>', choices: "NO_KEYS", trial_duration: 500 };

timeline.push({
  type: jsPsychInstructions,
  pages: [`
    <div class="instructions-box">
      <div class="instructions-title">INSTRUCTIONS</div>
      <p>Each job requires a specific skill set but also specific personality attributes to be performed successfully. Accordingly, in choosing the best job candidate, hiring managers are often assessing if applicants possess the required, desirable personality attributes for the job they applied for.</p>
      <p>In this study, you will be presented with 52 pairs of adjectives reflecting various personality attributes. For each pair, your task will be to identify the more desirable personality attribute in a person applying for a Customer Service Representative job. Please read a brief job description for this job carefully.</p>
      <div class="job-box"><div class="job-title">Customer Service Representative job description</div>
      <p>Customer Service Representative is responsible for providing high-quality support to customers by addressing inquiries, resolving issues, and delivering accurate information about products and services. This role involves communicating with customers via phone, email, or chat, ensuring a positive and efficient customer experience.</p>
      <p>Key responsibilities include identifying customer needs, troubleshooting problems, processing orders or requests, and escalating complex issues when necessary. The representative maintains detailed and accurate records of customer interactions and follows up to ensure resolution and satisfaction.</p></div>
      <p>You will receive 1 SONA research participation credit for completing this task. If you correctly identify the more desirable attribute in over 90% of the pairs, your reward will double and you will be awarded 2 SONA research participation credit in total.</p>
      <p>The adjective pairs will appear on the screen one pair at the time, with one adjective to the left and one to the right. Use the “S” key on your keyboard to select the one on the left and the “K” key on your keyboard to select one to the right.</p>
      <p>Before you proceed to the main questionnaire, you will be presented with 3 practice pairs to familiarize yourself with the task and get used to keyboard keys.</p>
    </div>`],
  show_clickable_nav: true,
  allow_backward: false,
  show_page_number: false,
  button_label_next: "->"
});

const practiceStimuli = [
  { pair_id: "P1", word1: "Kind", word2: "Reckless", condition: "practice" },
  { pair_id: "P2", word1: "Caring", word2: "Thorough", condition: "practice" },
  { pair_id: "P3", word1: "Harsh", word2: "Careless", condition: "practice" }
];

practiceStimuli.map(randomizePairSides).forEach(item => {
  timeline.push(fixation);
  timeline.push(makeTrial(item, "practice_forced_choice", true));
});

timeline.push({
  type: jsPsychInstructions,
  pages: ['<p>You have finished the practice trials.</p><p>The main task will begin next.</p><p>Please respond as quickly and accurately as possible.</p>'],
  show_clickable_nav: true,
  allow_backward: false,
  show_page_number: false,
  button_label_next: "Begin"
});

const mainStimuli = [
  { pair_id: 1, word1: "Agreeable", word2: "Polished", condition: "matched_positive" },
  { pair_id: 2, word1: "Cooperative", word2: "Precise", condition: "matched_positive" },
  { pair_id: 3, word1: "Helpful", word2: "Efficient", condition: "matched_positive" },
  { pair_id: 4, word1: "Kind", word2: "Organized", condition: "matched_positive" },
  { pair_id: 5, word1: "Trustful", word2: "Neat", condition: "matched_positive" },
  { pair_id: 6, word1: "Patient", word2: "Consistent", condition: "matched_positive" },
  { pair_id: 7, word1: "Considerate", word2: "Lively", condition: "matched_positive" },
  { pair_id: 8, word1: "Sympathetic", word2: "Outgoing", condition: "matched_positive" },
  { pair_id: 9, word1: "Warm", word2: "Merry", condition: "matched_positive" },
  { pair_id: 10, word1: "Caring", word2: "Jolly", condition: "matched_positive" },
  { pair_id: 11, word1: "Gentle", word2: "Active", condition: "matched_positive" },
  { pair_id: 12, word1: "Responsible", word2: "Friendly", condition: "matched_positive" },
  { pair_id: 13, word1: "Thorough", word2: "Calm", condition: "matched_positive" },
  { pair_id: 14, word1: "Harsh", word2: "Careless", condition: "matched_negative" },
  { pair_id: 15, word1: "Rude", word2: "Unreliable", condition: "matched_negative" },
  { pair_id: 16, word1: "Hostile", word2: "Inconsistent", condition: "matched_negative" },
  { pair_id: 17, word1: "Revengeful", word2: "Negligent", condition: "matched_negative" },
  { pair_id: 18, word1: "Cold", word2: "Envious", condition: "matched_negative" },
  { pair_id: 19, word1: "Antagonistic", word2: "Irritable", condition: "matched_negative" },
  { pair_id: 20, word1: "Ruthless", word2: "Moody", condition: "matched_negative" },
  { pair_id: 21, word1: "Spiteful", word2: "Weepy", condition: "matched_negative" },
  { pair_id: 22, word1: "Inefficient", word2: "Jealous", condition: "matched_negative" },
  { pair_id: 23, word1: "Impulsive", word2: "Insecure", condition: "matched_negative" },
  { pair_id: 24, word1: "Introverted", word2: "Anxious", condition: "matched_negative" },
  { pair_id: 25, word1: "Shy", word2: "Nervous", condition: "matched_negative" },
  { pair_id: 26, word1: "Withdrawn", word2: "Tense", condition: "matched_negative" },
  { pair_id: 27, word1: "Agreeable", word2: "Tense", condition: "mixed", more_desirable: "Agreeable" },
  { pair_id: 28, word1: "Cooperative", word2: "Nervous", condition: "mixed", more_desirable: "Cooperative" },
  { pair_id: 29, word1: "Helpful", word2: "Anxious", condition: "mixed", more_desirable: "Helpful" },
  { pair_id: 30, word1: "Kind", word2: "Insecure", condition: "mixed", more_desirable: "Kind" },
  { pair_id: 31, word1: "Trustful", word2: "Jealous", condition: "mixed", more_desirable: "Trustful" },
  { pair_id: 32, word1: "Patient", word2: "Weepy", condition: "mixed", more_desirable: "Patient" },
  { pair_id: 33, word1: "Considerate", word2: "Moody", condition: "mixed", more_desirable: "Considerate" },
  { pair_id: 34, word1: "Sympathetic", word2: "Irritable", condition: "mixed", more_desirable: "Sympathetic" },
  { pair_id: 35, word1: "Warm", word2: "Envious", condition: "mixed", more_desirable: "Warm" },
  { pair_id: 36, word1: "Caring", word2: "Negligent", condition: "mixed", more_desirable: "Caring" },
  { pair_id: 37, word1: "Gentle", word2: "Inconsistent", condition: "mixed", more_desirable: "Gentle" },
  { pair_id: 38, word1: "Responsible", word2: "Unreliable", condition: "mixed", more_desirable: "Responsible" },
  { pair_id: 39, word1: "Thorough", word2: "Careless", condition: "mixed", more_desirable: "Thorough" },
  { pair_id: 40, word1: "Harsh", word2: "Calm", condition: "mixed", more_desirable: "Calm" },
  { pair_id: 41, word1: "Rude", word2: "Friendly", condition: "mixed", more_desirable: "Friendly" },
  { pair_id: 42, word1: "Hostile", word2: "Active", condition: "mixed", more_desirable: "Active" },
  { pair_id: 43, word1: "Revengeful", word2: "Jolly", condition: "mixed", more_desirable: "Jolly" },
  { pair_id: 44, word1: "Cold", word2: "Merry", condition: "mixed", more_desirable: "Merry" },
  { pair_id: 45, word1: "Antagonistic", word2: "Outgoing", condition: "mixed", more_desirable: "Outgoing" },
  { pair_id: 46, word1: "Ruthless", word2: "Lively", condition: "mixed", more_desirable: "Lively" },
  { pair_id: 47, word1: "Spiteful", word2: "Consistent", condition: "mixed", more_desirable: "Consistent" },
  { pair_id: 48, word1: "Inefficient", word2: "Neat", condition: "mixed", more_desirable: "Neat" },
  { pair_id: 49, word1: "Impulsive", word2: "Organized", condition: "mixed", more_desirable: "Organized" },
  { pair_id: 50, word1: "Introverted", word2: "Efficient", condition: "mixed", more_desirable: "Efficient" },
  { pair_id: 51, word1: "Shy", word2: "Precise", condition: "mixed", more_desirable: "Precise" },
  { pair_id: 52, word1: "Withdrawn", word2: "Polished", condition: "mixed", more_desirable: "Polished" }
];

jsPsych.randomization.shuffle(mainStimuli.map(randomizePairSides)).forEach(item => {
  timeline.push(fixation);
  timeline.push(makeTrial(item, "main_forced_choice", false));
});

timeline.push({
  type: jsPsychInstructions,
  pages: [`
    <div class="debrief-box">
      <div class="debrief-title">DEBRIEF</div>
      <p>Thank you for completing the questionnaire!</p>
      <p>As stated at the beginning of the study, the purpose of this study was to examine how efficient people are in identifying personality attributes that are more desirable in applicants for a specific job. You were presented with 52 pairs of personality attributes. Some of those pairs were mixed, composed of one undesirable and one desirable attribute for the target job (for instance, Kind vs Reckless), and some pairs were matched, composed of attributes that were similar in desirability for the target job (for instance, Caring vs Thorough). Our research hypothesis was that participants would identify the more desirable attribute more efficiently — that is, with less time and effort — in mixed pairs than in matched pairs.</p>
      <p>In mixed pairs, the more desirable option may be easier to distinguish, whereas in matched pairs the preferred option may be less clear and more open to individual interpretation. Accordingly, you will be awarded 2 SONA research participation credits for completing this study regardless of your choices of personality attributes.</p>
      <p>Please proceed and answer the 3 follow-up questions and the demographic questions to complete this study.</p>
    </div>`],
  show_clickable_nav: true,
  allow_backward: false,
  show_page_number: false,
  button_label_next: "Proceed"
});

timeline.push({
  type: jsPsychSurveyHtmlForm,
  data: { task: "imc_question" },
  html: `<div class="form-box"><div class="form-title">DATA QUALITY CHECKS</div><div class="question-block"><div class="question-title">1. Instructional manipulation check</div><p>Please mark the option below that best describes your choices of attributes:</p><p>I compared each attribute pair with respect to how desirable it would be to be possessed by an applicant for the job of:</p>
  <label class="option-line"><input type="radio" name="imc" value="1" required> High School Teacher</label>
  <label class="option-line"><input type="radio" name="imc" value="2"> Firefighter</label>
  <label class="option-line"><input type="radio" name="imc" value="3"> Data Analyst</label>
  <label class="option-line"><input type="radio" name="imc" value="4"> Customer Service Representative</label>
  <label class="option-line"><input type="radio" name="imc" value="5"> Sales Representative</label></div></div>`,
  button_label: "Next",
  on_finish: parseSurveyResponse
});

timeline.push({
  type: jsPsychSurveyHtmlForm,
  data: { task: "english_question" },
  html: `<div class="form-box"><div class="form-title">DATA QUALITY CHECKS</div><div class="question-block"><div class="question-title">2. English proficiency self-report</div><p>How would you rate your proficiency in understanding written English?</p>
  <label class="option-line"><input type="radio" name="english" value="1" required> Low</label>
  <label class="option-line"><input type="radio" name="english" value="2"> Moderate</label>
  <label class="option-line"><input type="radio" name="english" value="3"> High</label></div></div>`,
  button_label: "Next",
  on_finish: parseSurveyResponse
});

timeline.push({
  type: jsPsychSurveyHtmlForm,
  data: { task: "careless_question" },
  html: `<div class="form-box"><div class="form-title">DATA QUALITY CHECKS</div><div class="question-block"><div class="question-title">3. Self-report measure of careless/insufficient effort responding</div><p>Results of our study will depend a lot on the quality of your responses. Is there any reason we should exclude your responses from our data analysis (e.g., you were being distracted while choosing the attributes; your computer was malfunctioning while completing the questionnaire; you did not put forth an effort in identifying more desirable attributes; you were selecting attributes at random…)?</p><p><em>You will receive 2 credits for this study no matter how you respond to this question.</em></p>
  <label class="option-line"><input type="radio" name="careless" value="1" required> Yes – my responses SHOULD be thrown out</label>
  <label class="option-line"><input type="radio" name="careless" value="2"> No – my survey responses SHOULD NOT be thrown out</label></div></div>`,
  button_label: "Next",
  on_finish: parseSurveyResponse
});

timeline.push({ type: jsPsychSurveyHtmlForm, data: { task: "age_question" }, html: `<div class="form-box"><div class="form-title">DEMOGRAPHIC QUESTIONS</div><div class="question-block"><div class="question-title">How old are you?</div><input class="text-input" type="number" name="age" min="18" max="99" required></div></div>`, button_label: "Next", on_finish: parseSurveyResponse });

timeline.push({
  type: jsPsychSurveyHtmlForm,
  data: { task: "gender_question" },
  html: `<div class="form-box"><div class="form-title">DEMOGRAPHIC QUESTIONS</div><div class="question-block"><div class="question-title">What is your gender?</div>
  <label class="option-line"><input type="radio" name="gender" value="1" required> Man</label>
  <label class="option-line"><input type="radio" name="gender" value="2"> Woman</label>
  <label class="option-line"><input type="radio" name="gender" value="3"> Non-binary</label>
  <label class="option-line"><input type="radio" name="gender" value="4"> Prefer to self-describe</label><input class="text-input" type="text" name="gender_text" placeholder="Optional self-description">
  <label class="option-line"><input type="radio" name="gender" value="5"> Prefer not to answer</label></div></div>`,
  button_label: "Next",
  on_finish: parseSurveyResponse
});

timeline.push({
  type: jsPsychSurveyHtmlForm,
  data: { task: "year_school_question" },
  html: `<div class="form-box"><div class="form-title">DEMOGRAPHIC QUESTIONS</div><div class="question-block"><div class="question-title">What year of school are you in?</div>
  <label class="option-line"><input type="radio" name="year_school" value="1" required> Freshman</label>
  <label class="option-line"><input type="radio" name="year_school" value="2"> Sophomore</label>
  <label class="option-line"><input type="radio" name="year_school" value="3"> Junior</label>
  <label class="option-line"><input type="radio" name="year_school" value="4"> Senior</label>
  <label class="option-line"><input type="radio" name="year_school" value="5"> Prefer to self-describe</label><input class="text-input" type="text" name="year_school_text" placeholder="Optional self-description">
  <label class="option-line"><input type="radio" name="year_school" value="6"> Prefer not to answer</label></div></div>`,
  button_label: "Next",
  on_finish: parseSurveyResponse
});

timeline.push({
  type: jsPsychSurveyHtmlForm,
  data: { task: "ethnicity_question" },
  html: `<div class="form-box"><div class="form-title">DEMOGRAPHIC QUESTIONS</div><div class="question-block"><div class="question-title">What is your ethnicity?</div>
  <label class="option-line"><input type="radio" name="ethnicity" value="1" required> American Indian / Alaskan Indian</label>
  <label class="option-line"><input type="radio" name="ethnicity" value="2"> Native Hawaiian or Other Pacific Islander</label>
  <label class="option-line"><input type="radio" name="ethnicity" value="3"> Black / African American</label>
  <label class="option-line"><input type="radio" name="ethnicity" value="4"> White / Caucasian</label>
  <label class="option-line"><input type="radio" name="ethnicity" value="5"> Prefer to self-describe</label><input class="text-input" type="text" name="ethnicity_text" placeholder="Optional self-description">
  <label class="option-line"><input type="radio" name="ethnicity" value="6"> Prefer not to answer</label></div></div>`,
  button_label: "Next",
  on_finish: parseSurveyResponse
});

timeline.push({
  type: jsPsychSurveyHtmlForm,
  data: { task: "hispanic_question" },
  html: `<div class="form-box"><div class="form-title">DEMOGRAPHIC QUESTIONS</div><div class="question-block"><div class="question-title">Are you Hispanic or Latino?</div>
  <label class="option-line"><input type="radio" name="hispanic" value="1" required> Yes</label>
  <label class="option-line"><input type="radio" name="hispanic" value="2"> No</label>
  <label class="option-line"><input type="radio" name="hispanic" value="3"> Prefer not to answer</label></div></div>`,
  button_label: "Submit",
  on_finish: parseSurveyResponse
});

jsPsych.run(timeline);
</script>
</html>
