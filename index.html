<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Response Latencies Study 2</title>

  <script src="https://unpkg.com/jspsych@8.2.2"></script>
  <link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet" />

  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
  <script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>

  <style>
    body { background: #ffffff; }
    .trial-wrapper { max-width: 1000px; margin: 0 auto; text-align: center; }
    .trial-question { font-size: 24px; margin-bottom: 18px; }
    .trial-subtext { font-size: 17px; margin-bottom: 50px; }
    .pair-row { display: flex; justify-content: space-around; margin-top: 30px; }
    .pair-option { width: 40%; }
    .key-label { font-size: 18px; margin-bottom: 10px; font-weight: bold; }
    .word-label { font-size: 36px; }
    .fixation { font-size: 56px; }
  </style>
</head>

<body></body>

<script>
function getUrlParam(param) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param);
}

const sona_id = getUrlParam("sona_id") || "NO_SONA_ID";
const return_url = "https://uteppsychology.az1.qualtrics.com/jfe/form/SV_6nxWdRPgkB7ftMG";

const jsPsych = initJsPsych({
  on_finish: function () {
    const main_data = jsPsych.data.get().filter({ task: "main_forced_choice" });
    const n_main_trials = main_data.count();
    const last_trial = main_data.last(1).values()[0] || {};

    const final_url = new URL(return_url);
    final_url.searchParams.set("sona_id", sona_id);
    final_url.searchParams.set("completed", "1");
    final_url.searchParams.set("n_main_trials", String(n_main_trials));
    final_url.searchParams.set("last_choice", String(last_trial.chosen || ""));
    final_url.searchParams.set("last_rt", String(last_trial.rt || ""));
    final_url.searchParams.set("last_pair_id", String(last_trial.pair_id || ""));
    final_url.searchParams.set("last_is_flipped", String(last_trial.is_flipped || ""));

    window.location.assign(final_url.toString());
  }
});
const timeline = [];

// RANDOMIZE HORIZONTAL
function randomizePairSides(pair) {
  const flip = Math.random() < 0.5;

  return {
    ...pair,
    display_left: flip ? pair.word2 : pair.word1,
    display_right: flip ? pair.word1 : pair.word2,
    is_flipped: flip ? 1 : 0
  };
}

// TRIAL
function makeTrial(item, taskLabel) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="trial-wrapper">
        <div class="trial-question">
          Which adjective is more desirable for a Customer Service Representative?
        </div>

        <div class="trial-subtext">
          Press S for left, K for right
        </div>

        <div class="pair-row">
          <div class="pair-option">
            <div class="key-label">S</div>
            <div class="word-label">${item.display_left}</div>
          </div>

          <div class="pair-option">
            <div class="key-label">K</div>
            <div class="word-label">${item.display_right}</div>
          </div>
        </div>
      </div>
    `,
    choices: ["s", "k"],
    data: {
      task: taskLabel,
      pair_id: item.pair_id,
      condition: item.condition,
      word1: item.word1,
      word2: item.word2,
      is_flipped: item.is_flipped
    },
    on_finish: function(data) {
      const chosen = data.response === "s" ? item.display_left : item.display_right;

      data.chosen = chosen;
      data.chose_word1 = chosen === item.word1 ? 1 : 0;
      data.chose_word2 = chosen === item.word2 ? 1 : 0;

      if (item.condition === "mixed") {
        data.chose_more_desirable = chosen === item.word1 ? 1 : 0;
      } else {
        data.chose_more_desirable = "";
      }
    }
  };
}

// FIXATION
const fixation = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '<div class="fixation">+</div>',
  choices: "NO_KEYS",
  trial_duration: 500
};

// INSTRUCTIONS
timeline.push({
  type: jsPsychInstructions,
  pages: [
    "<p>Welcome! You will choose the more desirable adjective.</p>",
    "<p>Press S for left, K for right.</p>"
  ],
  show_clickable_nav: true
});

// MAIN STIMULI 
const mainStimuli = [
  { pair_id: 1, word1: "Agreeable", word2: "Polished", condition: "matched_positive" },
  { pair_id: 2, word1: "Cooperative", word2: "Precise", condition: "matched_positive" },
  { pair_id: 3, word1: "Helpful", word2: "Efficient", condition: "matched_positive" }, 
  { pair_id: 4, word1: "Kind", word2: "Organized", condition: "matched_positive" },
  { pair_id: 5, word1: "Trustful", word2: "Neat", condition: "matched_positive" },
  { pair_id: 6, word1: "Patient", word2: "Consistent", condition: "matched_positive" },
  { pair_id: 7, word1: "Considerate", word2: "Lively", condition: "matched_positive" },
  { pair_id: 8, word1: "Sympathetic", word2: "Outgoing", condition: "matched_positive" },
  { pair_id: 9, word1: "Warm", word2: "Merry", condition: "matched_positive" },
  { pair_id: 10, word1: "Caring", word2: "Jolly", condition: "matched_positive" },
  { pair_id: 11, word1: "Gentle", word2: "Active", condition: "matched_positive" },
  { pair_id: 12, word1: "Responsible", word2: "Friendly", condition: "matched_positive" },
  { pair_id: 13, word1: "Thorough", word2: "Calm", condition: "matched_positive" },

  { pair_id: 14, word1: "Harsh", word2: "Careless", condition: "matched_negative" },
  { pair_id: 15, word1: "Rude", word2: "Unreliable", condition: "matched_negative" },
  { pair_id: 16, word1: "Hostile", word2: "Inconsistent", condition: "matched_negative" },
  { pair_id: 17, word1: "Revengeful", word2: "Negligent", condition: "matched_negative" },
  { pair_id: 18, word1: "Cold", word2: "Envious", condition: "matched_negative" },
  { pair_id: 19, word1: "Antagonistic", word2: "Irritable", condition: "matched_negative" },
  { pair_id: 20, word1: "Ruthless", word2: "Moody", condition: "matched_negative" },
  { pair_id: 21, word1: "Spiteful", word2: "Weepy", condition: "matched_negative" },
  { pair_id: 22, word1: "Inefficient", word2: "Jealous", condition: "matched_negative" },
  { pair_id: 23, word1: "Impulsive", word2: "Insecure", condition: "matched_negative" },
  { pair_id: 24, word1: "Introverted", word2: "Anxious", condition: "matched_negative" },
  { pair_id: 25, word1: "Shy", word2: "Nervous", condition: "matched_negative" },
  { pair_id: 26, word1: "Withdrawn", word2: "Tense", condition: "matched_negative" },

];

// RUN
const randomized = jsPsych.randomization.shuffle(mainStimuli.map(randomizePairSides));

randomized.forEach(item => {
  timeline.push(fixation);
  timeline.push(makeTrial(item, "main_forced_choice"));
});

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: "<p>Done! Press any key.</p>"
});

jsPsych.run(timeline);
</script>
</html>
