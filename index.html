<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Response Latencies Study 2</title>

<script src="https://unpkg.com/jspsych@8.2.2"></script>
<link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet">

<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>

<style>
body { background: #ffffff; }

.trial-wrapper {
  width: 1000px;
  margin: 0 auto;
  text-align: center;
}

.pair-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  column-gap: 150px;
  align-items: start;
  margin-top: 110px;
}

.pair-option { width: 100%; }

.key-label {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 18px;
}

.word-label {
  font-size: 42px;
  white-space: nowrap;
}

.practice-question {
  font-size: 24px;
  margin-bottom: 30px;
}

.practice-subtext {
  font-size: 18px;
  margin-bottom: 40px;
}

.fixation { font-size: 56px; }
</style>
</head>

<body></body>

<script>
function getUrlParam(param) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param);
}

const sona_id = getUrlParam("sona_id") || "NO_SONA_ID";
const return_url = "https://uteppsychology.az1.qualtrics.com/jfe/form/SV_6nxWdRPgkB7ftMG";

const jsPsych = initJsPsych({
  on_finish: function () {
    const main_data = jsPsych.data.get().filter({ task: "main_forced_choice" });
    const trials = main_data.values();

    function joinField(field) {
      return trials.map(t => t[field]).join("|");
    }

    const final_url = new URL(return_url);

    final_url.searchParams.set("sona_id", sona_id);
    final_url.searchParams.set("completed", "1");
    final_url.searchParams.set("n_main_trials", String(trials.length));

    final_url.searchParams.set("trial_order", joinField("pair_id"));
    final_url.searchParams.set("conditions", joinField("condition"));
    final_url.searchParams.set("word1s", joinField("word1"));
    final_url.searchParams.set("word2s", joinField("word2"));
    final_url.searchParams.set("left_words", joinField("display_left"));
    final_url.searchParams.set("right_words", joinField("display_right"));
    final_url.searchParams.set("key_pressed", joinField("response"));
    final_url.searchParams.set("chosen_actual", joinField("chosen_actual"));
    final_url.searchParams.set("chosen_standardized", joinField("chosen_standardized"));
    final_url.searchParams.set("chose_word1", joinField("chose_word1"));
    final_url.searchParams.set("chose_word2", joinField("chose_word2"));
    final_url.searchParams.set("chose_more_desirable", joinField("chose_more_desirable"));
    final_url.searchParams.set("rts", joinField("rt"));
    final_url.searchParams.set("is_flipped", joinField("is_flipped"));

    window.location.assign(final_url.toString());
  }
});

const timeline = [];

function randomizePairSides(pair) {
  const flip = Math.random() < 0.5;
  return {
    ...pair,
    display_left: flip ? pair.word2 : pair.word1,
    display_right: flip ? pair.word1 : pair.word2,
    is_flipped: flip ? 1 : 0
  };
}

function makeTrial(item, taskLabel, isPractice = false) {
  return {
    type: jsPsychHtmlKeyboardResponse,

    stimulus: `
      <div class="trial-wrapper">
        ${isPractice ? `
          <div class="practice-question">
            Which personality adjective below is more desirable in someone applying for the Customer Service Representative job?
          </div>
          <div class="practice-subtext">
            Press <strong>S</strong> for the adjective on the left and <strong>K</strong> for the adjective on the right.
          </div>
        ` : ``}

        <div class="pair-row">
          <div class="pair-option">
            <div class="key-label">S</div>
            <div class="word-label">${item.display_left}</div>
          </div>

          <div class="pair-option">
            <div class="key-label">K</div>
            <div class="word-label">${item.display_right}</div>
          </div>
        </div>
      </div>
    `,

    choices: ["s", "k"],

    data: {
      task: taskLabel,
      sona_id: sona_id,
      pair_id: item.pair_id,
      condition: item.condition,
      word1: item.word1,
      word2: item.word2,
      display_left: item.display_left,
      display_right: item.display_right,
      is_flipped: item.is_flipped
    },

    on_finish: function(data) {
      const chosen = data.response === "s" ? item.display_left : item.display_right;

      data.chosen_actual = chosen;

      if (chosen === item.word1) {
        data.chosen_standardized = "word1";
        data.chose_word1 = 1;
        data.chose_word2 = 0;
      } else if (chosen === item.word2) {
        data.chosen_standardized = "word2";
        data.chose_word1 = 0;
        data.chose_word2 = 1;
      } else {
        data.chosen_standardized = "";
        data.chose_word1 = "";
        data.chose_word2 = "";
      }

      if (item.condition === "mixed") {
        data.chose_more_desirable = chosen === item.more_desirable ? 1 : 0;
      } else {
        data.chose_more_desirable = "";
      }
    }
  };
}

const fixation = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: '<div class="fixation">+</div>',
  choices: "NO_KEYS",
  trial_duration: 500
};

timeline.push({
  type: jsPsychInstructions,
  pages: [
    `<p>Each job requires a specific skill set but also specific personality attributes to be performed successfully.</p>
     <p>Accordingly, in choosing the best job candidate, hiring managers are often assessing if applicants possess the required, desirable personality attributes for the job they applied for.</p>
     <p>In this study, you will be presented with pairs of adjectives reflecting various personality attributes.</p>
     <p>For each pair, your task will be to identify the more desirable personality attribute in a person applying for a Customer Service Representative job.</p>`,

    `<p><strong>Customer Service Representative job description</strong></p>
     <p>A Customer Service Representative is responsible for providing high-quality support to customers by addressing inquiries, resolving issues, and delivering accurate information about products and services.</p>
     <p>This role involves communicating with customers via phone, email, or chat, ensuring a positive and efficient customer experience.</p>
     <p>Key responsibilities include identifying customer needs, troubleshooting problems, processing orders or requests, escalating complex issues when necessary, maintaining accurate records, and following up to ensure resolution and satisfaction.</p>`,

    `<p>You will receive 1 SONA research participation credit for completing this task.</p>
     <p>If you correctly identify the more desirable attribute in over 90% of the pairs, your reward will double and you will be awarded 2 SONA research participation credits in total.</p>`,

    `<p>The adjective pairs will appear on the screen one pair at a time, with one adjective to the left and one adjective to the right.</p>
     <p>Use the <strong>S</strong> key on your keyboard to select the adjective on the left.</p>
     <p>Use the <strong>K</strong> key on your keyboard to select the adjective on the right.</p>
     <p>Before the main questionnaire, you will complete 3 practice pairs to familiarize yourself with the task and keyboard keys.</p>`
  ],
  show_clickable_nav: true
});

const practiceStimuli = [
  { pair_id: "P1", word1: "Kind", word2: "Reckless", condition: "practice" },
  { pair_id: "P2", word1: "Caring", word2: "Thorough", condition: "practice" },
  { pair_id: "P3", word1: "Harsh", word2: "Careless", condition: "practice" }
];

practiceStimuli.map(randomizePairSides).forEach(item => {
  timeline.push(fixation);
  timeline.push(makeTrial(item, "practice_forced_choice", true));
});

timeline.push({
  type: jsPsychInstructions,
  pages: [
    `<p>You have finished the practice trials.</p>
     <p>The main task will begin next.</p>
     <p>Please respond as quickly and accurately as possible.</p>`
  ],
  show_clickable_nav: true
});

const mainStimuli = [
  { pair_id: 1, word1: "Agreeable", word2: "Polished", condition: "matched_positive" },
  { pair_id: 2, word1: "Cooperative", word2: "Precise", condition: "matched_positive" },
  { pair_id: 3, word1: "Helpful", word2: "Efficient", condition: "matched_positive" },
  { pair_id: 4, word1: "Kind", word2: "Organized", condition: "matched_positive" },
  { pair_id: 5, word1: "Trustful", word2: "Neat", condition: "matched_positive" },
  { pair_id: 6, word1: "Patient", word2: "Consistent", condition: "matched_positive" },
  { pair_id: 7, word1: "Considerate", word2: "Lively", condition: "matched_positive" },
  { pair_id: 8, word1: "Sympathetic", word2: "Outgoing", condition: "matched_positive" },
  { pair_id: 9, word1: "Warm", word2: "Merry", condition: "matched_positive" },
  { pair_id: 10, word1: "Caring", word2: "Jolly", condition: "matched_positive" },
  { pair_id: 11, word1: "Gentle", word2: "Active", condition: "matched_positive" },
  { pair_id: 12, word1: "Responsible", word2: "Friendly", condition: "matched_positive" },
  { pair_id: 13, word1: "Thorough", word2: "Calm", condition: "matched_positive" },

  { pair_id: 14, word1: "Harsh", word2: "Careless", condition: "matched_negative" },
  { pair_id: 15, word1: "Rude", word2: "Unreliable", condition: "matched_negative" },
  { pair_id: 16, word1: "Hostile", word2: "Inconsistent", condition: "matched_negative" },
  { pair_id: 17, word1: "Revengeful", word2: "Negligent", condition: "matched_negative" },
  { pair_id: 18, word1: "Cold", word2: "Envious", condition: "matched_negative" },
  { pair_id: 19, word1: "Antagonistic", word2: "Irritable", condition: "matched_negative" },
  { pair_id: 20, word1: "Ruthless", word2: "Moody", condition: "matched_negative" },
  { pair_id: 21, word1: "Spiteful", word2: "Weepy", condition: "matched_negative" },
  { pair_id: 22, word1: "Inefficient", word2: "Jealous", condition: "matched_negative" },
  { pair_id: 23, word1: "Impulsive", word2: "Insecure", condition: "matched_negative" },
  { pair_id: 24, word1: "Introverted", word2: "Anxious", condition: "matched_negative" },
  { pair_id: 25, word1: "Shy", word2: "Nervous", condition: "matched_negative" },
  { pair_id: 26, word1: "Withdrawn", word2: "Tense", condition: "matched_negative" },

  { pair_id: 27, word1: "Agreeable", word2: "Tense", condition: "mixed", more_desirable: "Agreeable" },
  { pair_id: 28, word1: "Cooperative", word2: "Nervous", condition: "mixed", more_desirable: "Cooperative" },
  { pair_id: 29, word1: "Helpful", word2: "Anxious", condition: "mixed", more_desirable: "Helpful" },
  { pair_id: 30, word1: "Kind", word2: "Insecure", condition: "mixed", more_desirable: "Kind" },
  { pair_id: 31, word1: "Trustful", word2: "Jealous", condition: "mixed", more_desirable: "Trustful" },
  { pair_id: 32, word1: "Patient", word2: "Weepy", condition: "mixed", more_desirable: "Patient" },
  { pair_id: 33, word1: "Considerate", word2: "Moody", condition: "mixed", more_desirable: "Considerate" },
  { pair_id: 34, word1: "Sympathetic", word2: "Irritable", condition: "mixed", more_desirable: "Sympathetic" },
  { pair_id: 35, word1: "Warm", word2: "Envious", condition: "mixed", more_desirable: "Warm" },
  { pair_id: 36, word1: "Caring", word2: "Negligent", condition: "mixed", more_desirable: "Caring" },
  { pair_id: 37, word1: "Gentle", word2: "Inconsistent", condition: "mixed", more_desirable: "Gentle" },
  { pair_id: 38, word1: "Responsible", word2: "Unreliable", condition: "mixed", more_desirable: "Responsible" },
  { pair_id: 39, word1: "Thorough", word2: "Careless", condition: "mixed", more_desirable: "Thorough" },

  { pair_id: 40, word1: "Harsh", word2: "Calm", condition: "mixed", more_desirable: "Calm" },
  { pair_id: 41, word1: "Rude", word2: "Friendly", condition: "mixed", more_desirable: "Friendly" },
  { pair_id: 42, word1: "Hostile", word2: "Active", condition: "mixed", more_desirable: "Active" },
  { pair_id: 43, word1: "Revengeful", word2: "Jolly", condition: "mixed", more_desirable: "Jolly" },
  { pair_id: 44, word1: "Cold", word2: "Merry", condition: "mixed", more_desirable: "Merry" },
  { pair_id: 45, word1: "Antagonistic", word2: "Outgoing", condition: "mixed", more_desirable: "Outgoing" },
  { pair_id: 46, word1: "Ruthless", word2: "Lively", condition: "mixed", more_desirable: "Lively" },
  { pair_id: 47, word1: "Spiteful", word2: "Consistent", condition: "mixed", more_desirable: "Consistent" },
  { pair_id: 48, word1: "Inefficient", word2: "Neat", condition: "mixed", more_desirable: "Neat" },
  { pair_id: 49, word1: "Impulsive", word2: "Organized", condition: "mixed", more_desirable: "Organized" },
  { pair_id: 50, word1: "Introverted", word2: "Efficient", condition: "mixed", more_desirable: "Efficient" },
  { pair_id: 51, word1: "Shy", word2: "Precise", condition: "mixed", more_desirable: "Precise" },
  { pair_id: 52, word1: "Withdrawn", word2: "Polished", condition: "mixed", more_desirable: "Polished" }
];

jsPsych.randomization.shuffle(mainStimuli.map(randomizePairSides)).forEach(item => {
  timeline.push(fixation);
  timeline.push(makeTrial(item, "main_forced_choice", false));
});

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: "<p>Done! Press any key to submit your responses.</p>"
});

jsPsych.run(timeline);
</script>
</html>
