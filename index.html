<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Response Latencies Study 2</title>

<script src="https://unpkg.com/jspsych@8.2.2"></script>
<link href="https://unpkg.com/jspsych@8.2.2/css/jspsych.css" rel="stylesheet">
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-instructions@2.1.0"></script>

<style>
/* FORCE WHITE EVERYWHERE */
html, body{
  margin:0 !important;
  padding:0 !important;
  background:#ffffff !important;
  color:#000000 !important;
}

#jspsych-target,
.jspsych-display-element,
.jspsych-content-wrapper,
.jspsych-content{
  background:#ffffff !important;
  color:#000000 !important;
}

/* BUTTONS */
button,
.jspsych-btn{
  background:#ffffff !important;
  color:#000000 !important;
  border:1px solid #000000 !important;
}

/* GENERAL */
.trial-wrapper{
  width:1000px;
  margin:0 auto;
  text-align:center;
}

.pair-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  column-gap:220px;
  align-items:start;
  margin-top:130px;
}

.pair-option{
  width:100%;
}

.key-label{
  font-size:22px;
  font-weight:bold;
  margin-bottom:18px;
  color:#000000 !important;
}

.word-label{
  font-size:42px;
  white-space:nowrap;
  color:#000000 !important;
}

.practice-question{
  font-size:24px;
  margin-bottom:28px;
  color:#000000 !important;
}

.practice-subtext{
  font-size:18px;
  margin-bottom:35px;
  color:#000000 !important;
}

.fixation{
  font-size:58px;
  color:#000000 !important;
}
</style>
</head>

<body></body>

<script>
function getUrlParam(param){
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param);
}

const sona_id = getUrlParam("sona_id") || "NO_SONA_ID";
const return_url = "https://uteppsychology.az1.qualtrics.com/jfe/form/SV_6nxWdRPgkB7ftMG";

const jsPsych = initJsPsych({
  display_element: document.body,

  on_finish:function(){

    const main_data = jsPsych.data.get().filter({task:"main_forced_choice"});
    const trials = main_data.values();

    function joinField(field){
      return trials.map(t => t[field]).join("|");
    }

    const final_url = new URL(return_url);

    final_url.searchParams.set("sona_id", sona_id);
    final_url.searchParams.set("completed","1");
    final_url.searchParams.set("n_main_trials", String(trials.length));

    final_url.searchParams.set("trial_order", joinField("pair_id"));
    final_url.searchParams.set("conditions", joinField("condition"));
    final_url.searchParams.set("key_pressed", joinField("response"));
    final_url.searchParams.set("chosen_standardized", joinField("chosen_standardized"));
    final_url.searchParams.set("chose_more_desirable", joinField("chose_more_desirable"));
    final_url.searchParams.set("rts", joinField("rt"));
    final_url.searchParams.set("is_flipped", joinField("is_flipped"));

    window.location.assign(final_url.toString());
  }
});

const timeline = [];

/* ---------- RANDOMIZATION ---------- */

function randomizePairSides(pair){

  const flip = Math.random() < 0.5;

  return {
    ...pair,
    display_left: flip ? pair.word2 : pair.word1,
    display_right: flip ? pair.word1 : pair.word2,
    is_flipped: flip ? 1 : 0
  };
}

/* ---------- TRIAL BUILDER ---------- */

function makeTrial(item, taskLabel, isPractice=false){

  return {

    type: jsPsychHtmlKeyboardResponse,

    stimulus: `
      <div class="trial-wrapper">

        ${isPractice ? `
        <div class="practice-question">
          Which personality adjective below is more desirable in someone applying for the Customer Service Representative job?
        </div>

        <div class="practice-subtext">
          Press <strong>S</strong> for the adjective on the left and
          <strong>K</strong> for the adjective on the right.
        </div>
        ` : ``}

        <div class="pair-row">

          <div class="pair-option">
            <div class="key-label">S</div>
            <div class="word-label">${item.display_left}</div>
          </div>

          <div class="pair-option">
            <div class="key-label">K</div>
            <div class="word-label">${item.display_right}</div>
          </div>

        </div>

      </div>
    `,

    choices:["s","k"],

    data:{
      task:taskLabel,
      pair_id:item.pair_id,
      condition:item.condition,
      word1:item.word1,
      word2:item.word2,
      is_flipped:item.is_flipped
    },

    on_finish:function(data){

      const chosen =
        data.response === "s"
        ? item.display_left
        : item.display_right;

      if(chosen === item.word1){
        data.chosen_standardized = "word1";
      } else {
        data.chosen_standardized = "word2";
      }

      if(item.condition === "mixed"){
        data.chose_more_desirable =
          chosen === item.more_desirable ? 1 : 0;
      } else {
        data.chose_more_desirable = "";
      }
    }
  };
}

/* ---------- FIXATION ---------- */

const fixation = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus:'<div class="fixation">+</div>',
  choices:"NO_KEYS",
  trial_duration:500
};

/* ---------- INSTRUCTIONS ---------- */

timeline.push({
  type: jsPsychInstructions,
  pages:[
`
<div style="max-width:760px;margin:0 auto;text-align:left;color:black;font-family:Arial,sans-serif;line-height:1.4;font-size:17px;">

<div style="text-align:center;font-weight:bold;font-size:28px;margin-bottom:26px;">
INSTRUCTIONS
</div>

<p>
Each job requires a specific skill set but also specific personality attributes to be performed successfully.
Accordingly, in choosing the best job candidate, hiring managers are often assessing if applicants possess the required,
desirable personality attributes for the job they applied for.
</p>

<p>
In this study, you will be presented with 52 pairs of adjectives reflecting various personality attributes.
For each pair, your task will be to identify the more desirable personality attribute in a person applying for a Customer Service Representative job.
Please read a brief job description for this job carefully.
</p>

<div style="border:1px solid black;padding:14px;margin:24px 0;font-style:italic;">

<div style="font-weight:bold;margin-bottom:12px;">
Customer Service Representative job description
</div>

<p>
Customer Service Representative is responsible for providing high-quality support to customers by addressing inquiries,
resolving issues, and delivering accurate information about products and services.
This role involves communicating with customers via phone, email, or chat, ensuring a positive and efficient customer experience.
</p>

<p>
Key responsibilities include identifying customer needs, troubleshooting problems, processing orders or requests,
and escalating complex issues when necessary.
The representative maintains detailed and accurate records of customer interactions and follows up to ensure resolution and satisfaction.
</p>

</div>

<p>
You will receive 1 SONA research participation credit for completing this task.
If you correctly identify the more desirable attribute in over 90% of the pairs, your reward will double and you will be awarded 2 SONA research participation credits in total.
</p>

<p>
Use the S key for the left adjective and the K key for the right adjective.
</p>

<p>
You will first complete 3 practice pairs.
</p>

</div>
`
  ],
  show_clickable_nav:true,
  button_label_next:"Begin"
});

/* ---------- PRACTICE ---------- */

const practiceStimuli = [
 {pair_id:"P1", word1:"Kind", word2:"Reckless", condition:"practice"},
 {pair_id:"P2", word1:"Caring", word2:"Thorough", condition:"practice"},
 {pair_id:"P3", word1:"Harsh", word2:"Careless", condition:"practice"}
];

practiceStimuli.map(randomizePairSides).forEach(item=>{
  timeline.push(fixation);
  timeline.push(makeTrial(item,"practice_forced_choice",true));
});

/* ---------- MAIN START ---------- */

timeline.push({
  type: jsPsychInstructions,
  pages:[
    "<p>You have finished the practice trials.</p><p>The main task will begin next.</p><p>Please respond as quickly and accurately as possible.</p>"
  ],
  show_clickable_nav:true,
  button_label_next:"Start"
});

/* ---------- SAMPLE TRIALS ---------- */
/* Replace with your full 52 list */

const mainStimuli = [
 {pair_id:1, word1:"Agreeable", word2:"Polished", condition:"matched_positive"},
 {pair_id:2, word1:"Cooperative", word2:"Precise", condition:"matched_positive"},
 {pair_id:39, word1:"Thorough", word2:"Careless", condition:"mixed", more_desirable:"Thorough"}
];

jsPsych.randomization.shuffle(mainStimuli.map(randomizePairSides)).forEach(item=>{
  timeline.push(fixation);
  timeline.push(makeTrial(item,"main_forced_choice",false));
});

/* ---------- END ---------- */

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus:"<p>Done! Press any key to submit your responses.</p>"
});

jsPsych.run(timeline);

</script>
</html>
